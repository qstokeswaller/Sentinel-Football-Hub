<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Planner | UP Performance Analysis Hub</title>
    <link rel="stylesheet" href="css/style.css?v=1771598058764">
    <link rel="stylesheet" href="css/planner.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/api-config.js"></script>
</head>

<body>
    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-logo"><i class="fas fa-futbol"></i></div>
                <div class="brand-text">
                    <h3>Football</h3>
                    <p>Performance Hub</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard_v2.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
                    <li class="active"><a href="planner.html"><i class="fas fa-clipboard-list"></i><span>Session
                                Planner</span></a></li>
                    <li><a href="library.html"><i class="fas fa-book"></i><span>Library</span></a></li>
                    <li><a href="reports.html"><i class="fas fa-file-alt"></i><span>Reports</span></a></li>
                    <li><a href="squad.html"><i class="fas fa-user-friends"></i><span>Squad Management</span></a></li>
                    <li><a href="players.html"><i class="fas fa-user"></i><span>Player Management</span></a></li>
                    <li><a href="matches.html"><i class="fas fa-futbol"></i><span>Matches</span></a></li>
                    <li><a href="analytics.html"><i class="fas fa-chart-line"></i><span>Analytics</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-toggle-sidebar" id="toggleSidebar" title="Toggle Sidebar">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div class="header-info">
                    <h1>Session Planner</h1>
                    <p>Build sessions, add drills, export to PDF</p>
                </div>
                <div class="header-actions">
                    <button class="dash-btn outline" onclick="listSessions()" style="margin-right:8px;">
                        <i class="fas fa-folder-open"></i> Load Session
                    </button>
                    <button class="dash-btn primary" onclick="saveSession()">
                        <i class="fas fa-save"></i> Save Session
                    </button>
                    <button class="dash-btn outline" onclick="exportSessionPDF()">
                        <i class="fas fa-file-pdf"></i> Export PDF
                    </button>
                    <button class="dash-btn outline" onclick="newSession()" style="margin-left:4px;">
                        <i class="fas fa-plus"></i> New
                    </button>
                </div>
            </header>

            <!-- SESSION META -->
            <div class="session-meta-card">
                <div class="meta-header">
                    <h2><i class="fas fa-clipboard-list"></i> Session Details</h2>
                </div>
                <div class="form-grid-3">
                    <div class="form-group">
                        <label class="form-label">Session Title</label>
                        <input type="text" id="sessionTitle" class="form-input"
                            placeholder="e.g. Tactical Build-up Play">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" id="sessionDate" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Start Time</label>
                        <input type="time" id="sessionStartTime" class="form-input">
                    </div>
                </div>
                <div class="form-grid-3">
                    <div class="form-group">
                        <label class="form-label">Venue</label>
                        <input type="text" id="sessionVenue" class="form-input" placeholder="Tuks Stadium">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Duration</label>
                        <input type="text" id="sessionDuration" class="form-input" placeholder="90 mins">
                    </div>
                    <div class="form-group">
                        <label class="form-label">No. of Players</label>
                        <input type="number" id="sessionPlayers" class="form-input" placeholder="22">
                    </div>
                </div>
                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Ability / Level</label>
                        <input type="text" id="sessionLevel" class="form-input" placeholder="Senior / Elite">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Equipment Needed</label>
                        <input type="text" id="sessionEquipment" class="form-input"
                            placeholder="Cones, Bibs, Balls, Mannequins">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Purpose / Objectives</label>
                    <input type="text" id="sessionPurpose" class="form-input"
                        placeholder="Improve transition from defence to attack">
                </div>
                <div
                    style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px; padding-top:20px; border-top:1px solid var(--border-light);">
                    <div class="form-group">
                        <label class="form-label">Author / Coach</label>
                        <input type="text" id="sessionAuthor" class="form-input" placeholder="e.g. Coach Ndlovu">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Team / Group</label>
                        <div style="position: relative;">
                            <select id="sessionTeam" class="form-input" style="appearance: none; padding-right: 35px;">
                                <option value="">Select Team</option>
                                <!-- Populated from Squad Database -->
                            </select>
                            <i class="fas fa-chevron-down"
                                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light); pointer-events: none;"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BLOCKS CONTAINER -->
            <div id="blocksContainer">
                <!-- Drills injected here -->
            </div>

            <!-- ADD BAR -->
            <div class="planner-add-bar">
                <h3 style="font-size:16px; font-weight:600; color:var(--text-medium); margin:0;">Add to Session Plan
                </h3>
                <div class="planner-add-actions">
                    <button class="btn-add-drill" onclick="addBlock('drill')">
                        <i class="fas fa-plus-circle"></i> Add Drill Block
                    </button>
                    <button class="btn-add-section" onclick="addBlock('section')">
                        Add Section
                    </button>
                </div>
            </div>

        </main>
    </div>

    <div id="planner-toast"></div>

    <!-- LOAD SESSION MODAL -->
    <div id="session-modal" class="modal-overlay"> <!-- ID Must be session-modal per planner.js -->
        <div class="modal-container">
            <div class="modal-header">
                <h3><i class="fas fa-folder-open"></i> Load Session</h3>
                <button class="modal-close" onclick="closeSessionModal()">×</button>
            </div>
            <div class="modal-body" id="session-list-body">
                <div class="session-list-empty">Loading saved sessions...</div>
            </div>
        </div>
    </div>

    <script src="js/sidebar-toggle.js"></script>
    <script src="js/drill-builder.js"></script>
    <script src="js/squad-manager.js"></script>
    <script src="js/planner.js"></script>
</body>

</html>
