<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Sentinel Football Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #00a882 0%, #00C49A 50%, #00a882 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .login-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            margin-bottom: 12px;
        }
        .login-logo i {
            font-size: 48px;
            color: #00C49A;
            margin-bottom: 12px;
        }
        .login-logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
        }
        .login-logo p {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .invite-banner {
            background: #065f4633;
            border: 1px solid #047857;
            color: #6ee7b7;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .invite-banner.show { display: block; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00C49A;
        }
        .name-row {
            display: flex;
            gap: 12px;
        }
        .name-row .form-group {
            flex: 1;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #00C49A;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #00a882; }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .toggle-mode {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
        .toggle-mode a {
            color: #00C49A;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .toggle-mode a:hover { text-decoration: underline; }
        .error-msg {
            background: #7f1d1d33;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .signup-fields { display: none; }
        .signup-fields.show { display: block; }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            body {
                min-height: 100dvh;
                padding: 16px;
                align-items: flex-start;
                padding-top: 40px;
            }
            .login-container {
                padding: 32px 24px;
                border-radius: 12px;
                max-width: 100%;
            }
            .login-logo {
                margin-bottom: 24px;
            }
            .login-logo img {
                width: 48px;
                height: 48px;
            }
            .login-logo h1 {
                font-size: 18px;
            }
            .login-logo p {
                font-size: 12px;
            }
            .form-group {
                margin-bottom: 16px;
            }
            .form-group input {
                padding: 12px;
                font-size: 16px; /* prevent iOS zoom */
            }
            .name-row {
                flex-direction: column;
                gap: 0;
            }
            .btn-login {
                padding: 14px;
                font-size: 15px;
                min-height: 48px;
            }
            .toggle-mode {
                margin-top: 16px;
            }
        }
    </style>
  <script type="module" crossorigin src="/assets/login-DWA4H_Zf.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/supabase-CNU450ah.js">
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <i class="fas fa-shield-alt" style="font-size:48px; color:#00C49A; display:block; margin-bottom:12px;"></i>
            <h1>Sentinel Football Hub</h1>
            <p id="loginSubtitle">Sign in to your coaching dashboard</p>
        </div>

        <div class="invite-banner" id="inviteBanner">
            <i class="fas fa-envelope-open-text"></i>&nbsp; You've been invited! Create your account below.
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="authForm">
            <div class="signup-fields" id="signupFields">
                <div class="name-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" placeholder="First name">
                    </div>
                    <div class="form-group">
                        <label>Surname</label>
                        <input type="text" id="surname" placeholder="Surname">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="coach@club.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Your password" required minlength="6">
            </div>

            <div class="signup-fields" id="confirmPasswordGroup">
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" minlength="6">
                </div>
            </div>

            <input type="hidden" id="inviteToken">

            <button type="submit" class="btn-login" id="submitBtn">Sign In</button>
        </form>

        <div class="toggle-mode" id="toggleMode">
            <span id="toggleText">Don't have an account?</span>
            <a id="toggleLink">Sign Up</a>
        </div>
    </div>

</body>
</html>
