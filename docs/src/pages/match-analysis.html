<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Analysis | Sentinel Football Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/theme-preload.js"></script>
    <script src="/sidebar-preload.js"></script>
    <style>
        .analysis-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 8px;
        }

        .match-score-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #1e293b;
        }

        .match-score-badge .vs { color: #94a3b8; font-weight: 500; font-size: 0.85rem; }
        .match-score-badge .score { color: var(--primary); font-size: 1.3rem; }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--navy-dark);
            margin: 0 0 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i { color: var(--primary); }

        /* Video cards */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .video-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.15s;
        }

        .video-card:hover { border-color: #94a3b8; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

        .video-embed {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #0f172a;
        }

        .video-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-embed .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            gap: 8px;
        }

        .video-embed .video-placeholder i { font-size: 2rem; color: #94a3b8; }

        .video-info {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .video-info .video-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e293b;
        }

        .video-info .video-type {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 6px;
            background: #e2e8f0;
            color: #64748b;
        }

        .video-info .video-type.full { background: #dbeafe; color: #1e40af; }
        .video-info .video-type.highlights { background: #fef3c7; color: #92400e; }

        .video-actions {
            padding: 0 16px 12px;
            display: flex;
            gap: 8px;
        }

        /* Add form */
        .add-video-form {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: end;
        }

        .add-video-form .form-group { margin: 0; }

        /* Link list */
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            transition: all 0.15s;
        }

        .link-item:hover { background: #f1f5f9; }

        .link-item .link-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            flex-shrink: 0;
        }

        .link-item .link-info { flex: 1; min-width: 0; }
        .link-item .link-title { font-weight: 600; font-size: 0.9rem; color: #1e293b; }
        .link-item .link-url { font-size: 0.78rem; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Notes */
        .analysis-notes {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            background: #f8fafc;
        }

        .analysis-notes:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .empty-state i { font-size: 2.5rem; margin-bottom: 12px; display: block; }
        .empty-state p { font-size: 0.9rem; margin: 4px 0; }

        /* Upload zone */
        .upload-zone {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            color: #64748b;
            font-size: 0.85rem;
            background: #f8fafc;
            width: 100%;
        }
        .upload-zone:hover { border-color: var(--primary); background: #f0f9ff; color: #3b82f6; }
        .upload-zone.drag-active { border-color: var(--primary); background: #eff6ff; }
        .upload-zone i { font-size: 1.1rem; flex-shrink: 0; }
        .upload-zone span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .upload-zone.has-file { border-color: #22c55e; background: #f0fdf4; color: #15803d; }

        /* Progress bar */
        .upload-progress {
            margin-top: 8px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .upload-progress .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0;
        }

        @media (max-width: 768px) {
            .video-grid { grid-template-columns: 1fr; }
            .add-video-form { grid-template-columns: 1fr; }
            .analysis-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
  <script type="module" crossorigin src="/assets/matchAnalysis-pFR4Mjn4.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/supabase-CNU450ah.js">
  <link rel="modulepreload" crossorigin href="/assets/auth-Cf7XUdJT.js">
  <link rel="modulepreload" crossorigin href="/assets/squad-manager-KIMjEl7t.js">
  <link rel="modulepreload" crossorigin href="/assets/preload-helper-BlTxHScW.js">
  <link rel="modulepreload" crossorigin href="/assets/rbac-LN74jxRk.js">
  <link rel="modulepreload" crossorigin href="/assets/page-init-zYDgsuAY.js">
  <link rel="stylesheet" crossorigin href="/assets/squad-manager-DGM_wgbO.css">

<style>
  .sidebar-shell {
    position: fixed; top: 0; left: 0; width: 260px; height: 100vh;
    background: #0D1B2A; z-index: 99;
  }
  /* Hide shell once real sidebar is loaded */
  .sidebar ~ .sidebar-shell,
  .sidebar-loaded .sidebar-shell { display: none; }
  .sidebar-loaded::before { display: none !important; }
  @media (max-width: 768px) { .sidebar-shell { display: none; } }
</style>
</head>

<body>
    <div class="app-container"><div class="sidebar-shell" aria-hidden="true"></div>
        <main class="main-content">
            <header class="page-header">
                <div class="header-info" style="display: flex; align-items: center; gap: 16px;">
                    <a href="javascript:void(0)" onclick="window.history.back()" class="dash-btn ghost" style="padding: 8px 14px; cursor: pointer;">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <div>
                        <h1 id="pageTitle">Match Analysis</h1>
                        <p id="pageSubtitle" style="color: var(--text-medium); font-size: 0.85rem;">Video analysis and match footage</p>
                    </div>
                </div>
                <div class="header-actions" style="display: flex; gap: 10px;">
                    <a id="linkToReport" href="#" class="dash-btn outline">
                        <i class="fas fa-file-alt"></i> View Report
                    </a>
                    <button class="dash-btn primary" onclick="saveAnalysis()">
                        <i class="fas fa-save"></i> Save
                    </button>
                </div>
            </header>

            <!-- Match Info Banner -->
            <div class="dash-card" style="padding: 16px 20px; margin-bottom: 16px;">
                <div class="analysis-header">
                    <div id="matchBanner" class="match-score-badge">
                        <span id="bannerHome">--</span>
                        <span class="score" id="bannerScore">-</span>
                        <span id="bannerAway">--</span>
                    </div>
                    <div style="color: #64748b; font-size: 0.85rem;">
                        <span id="bannerDate">--</span> &middot; <span id="bannerVenue">--</span> &middot; <span id="bannerComp">--</span>
                    </div>
                </div>
            </div>

            <!-- Videos Section -->
            <div class="dash-card" style="padding: 24px; margin-bottom: 16px;">
                <h3 class="section-title"><i class="fas fa-video"></i> Match Videos</h3>

                <div id="videoGrid" class="video-grid" style="margin-bottom: 20px;"></div>

                <div style="border-top: 1px solid #e2e8f0; padding-top: 16px;">
                    <h4 style="font-size: 0.85rem; font-weight: 700; color: #475569; margin: 0 0 12px;">Add Video Link</h4>
                    <div class="add-video-form">
                        <div class="form-group">
                            <input type="url" id="newVideoUrl" class="form-input" placeholder="https://youtube.com/watch?v=..." style="width:100%;padding:10px 14px;border-radius:10px;">
                        </div>
                        <div class="form-group">
                            <select id="newVideoType" class="form-select" style="padding:10px 14px;border-radius:10px;">
                                <option value="full">Full Match</option>
                                <option value="highlights">Highlights</option>
                                <option value="training">Training</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <button class="dash-btn primary" onclick="addVideo()" style="height: 42px;">
                            <i class="fas fa-plus"></i> Add
                        </button>
                    </div>
                </div>

                <div style="border-top: 1px solid #e2e8f0; padding-top: 16px; margin-top: 16px;">
                    <h4 style="font-size: 0.85rem; font-weight: 700; color: #475569; margin: 0 0 12px;"><i class="fas fa-upload" style="color: var(--primary); margin-right: 6px;"></i>Upload Video File</h4>
                    <div class="add-video-form">
                        <div class="form-group">
                            <label class="upload-zone" id="videoDropZone">
                                <input type="file" id="videoFileInput" accept="video/mp4,video/mov,video/avi,video/webm,video/mkv" hidden>
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span id="videoFileName">Choose file or drag & drop (mp4, mov, avi — max 50MB)</span>
                            </label>
                        </div>
                        <div class="form-group">
                            <select id="uploadVideoType" class="form-select" style="padding:10px 14px;border-radius:10px;">
                                <option value="full">Full Match</option>
                                <option value="highlights">Highlights</option>
                                <option value="training">Training</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <button class="dash-btn primary" id="btnUploadVideo" onclick="uploadVideoFile()" style="height: 42px;">
                            <i class="fas fa-upload"></i> Upload
                        </button>
                    </div>
                    <div class="upload-progress" id="videoUploadProgress" style="display:none;">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            </div>

            <!-- External Links Section -->
            <div class="dash-card" style="padding: 24px; margin-bottom: 16px;">
                <h3 class="section-title"><i class="fas fa-link"></i> Analysis Links</h3>

                <div id="linkList" class="link-list" style="margin-bottom: 16px;"></div>

                <div style="border-top: 1px solid #e2e8f0; padding-top: 16px;">
                    <h4 style="font-size: 0.85rem; font-weight: 700; color: #475569; margin: 0 0 12px;">Add Link</h4>
                    <div class="add-video-form">
                        <div class="form-group">
                            <input type="url" id="newLinkUrl" class="form-input" placeholder="https://..." style="width:100%;padding:10px 14px;border-radius:10px;">
                        </div>
                        <div class="form-group">
                            <input type="text" id="newLinkTitle" class="form-input" placeholder="Title (e.g. Scout Report)" style="width:100%;padding:10px 14px;border-radius:10px;">
                        </div>
                        <button class="dash-btn primary" onclick="addLink()" style="height: 42px;">
                            <i class="fas fa-plus"></i> Add
                        </button>
                    </div>
                </div>

                <div style="border-top: 1px solid #e2e8f0; padding-top: 16px; margin-top: 16px;">
                    <h4 style="font-size: 0.85rem; font-weight: 700; color: #475569; margin: 0 0 12px;"><i class="fas fa-upload" style="color: var(--primary); margin-right: 6px;"></i>Upload Document</h4>
                    <div class="add-video-form">
                        <div class="form-group">
                            <label class="upload-zone" id="docDropZone">
                                <input type="file" id="docFileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.csv,.txt,.png,.jpg,.jpeg" hidden>
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span id="docFileName">Choose file or drag & drop (PDF, Word, Excel, images — max 25MB)</span>
                            </label>
                        </div>
                        <div class="form-group">
                            <input type="text" id="uploadDocTitle" class="form-input" placeholder="Title (e.g. LongoMatch Export)" style="width:100%;padding:10px 14px;border-radius:10px;">
                        </div>
                        <button class="dash-btn primary" id="btnUploadDoc" onclick="uploadDocFile()" style="height: 42px;">
                            <i class="fas fa-upload"></i> Upload
                        </button>
                    </div>
                    <div class="upload-progress" id="docUploadProgress" style="display:none;">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            </div>

            <!-- Notes Section -->
            <div class="dash-card" style="padding: 24px;">
                <h3 class="section-title"><i class="fas fa-clipboard"></i> Analysis Notes</h3>
                <textarea class="analysis-notes" id="analysisNotes" placeholder="Key observations, tactical takeaways, areas for improvement..."></textarea>
            </div>
        </main>
    </div>

</body>

</html>
