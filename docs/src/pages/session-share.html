<body>
    <div class="share-container">
        <!-- Loading state -->
        <div id="shareLoading" class="share-loading">
            <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#3b82f6;"></i>
            <p>Loading session...</p>
        </div>

        </div>

        <!-- Session content -->
        <div id="shareContent" style="display:none;">
            <div class="share-header" id="shareHeader"></div>
            <div class="share-body" id="shareBody"></div>
        </div>

        <div class="share-footer">
            <p>Powered by <strong>Sentinel Football Hub</strong></p>
        </div>
    </div>
