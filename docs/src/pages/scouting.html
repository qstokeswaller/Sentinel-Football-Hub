<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scouting | Sentinel Football Hub</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ── Filter bar ── */
        .scouting-toolbar {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-label {
            font-size: 0.7rem; font-weight: 800; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.5px; margin-left: 4px;
        }
        .filter-pill-container {
            position: relative; display: inline-flex; align-items: center;
        }
        .filter-select-pill {
            appearance: none; -webkit-appearance: none;
            background: #fff; border: 2px solid var(--primary-light);
            border-radius: 20px; padding: 8px 36px 8px 16px;
            font-size: 0.85rem; font-weight: 500; color: var(--text-dark);
            cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .filter-select-pill:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,196,154,0.1); outline: none;
        }
        .filter-pill-container .fa-chevron-down {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%); color: var(--primary);
            pointer-events: none; font-size: 0.75rem;
        }

        /* ── Scout cards grid ── */
        .scout-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 16px;
        }
        .scout-card {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 18px;
            padding: 22px 18px 18px; cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .scout-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(0,196,154,0.13);
            border-color: #80e8d3;
        }
        .scout-card-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, #ccf5ec, #e6f9f4);
            color: var(--primary); display: flex; align-items: center; justify-content: center;
            font-size: 1.35rem; font-weight: 800; margin-bottom: 12px;
            border: 3px solid #fff; box-shadow: 0 0 0 2px #80e8d3;
        }
        .scout-card-name { font-size: 0.95rem; font-weight: 700; color: #1e3a5f; margin-bottom: 2px; }
        .scout-card-pos { font-size: 0.78rem; color: var(--text-medium); font-weight: 600; margin-bottom: 4px; }
        .scout-card-club { font-size: 0.72rem; color: var(--text-light); margin-bottom: 10px; }
        .scout-card-divider { width: 100%; border: 0; border-top: 1px solid #f1f5f9; margin: 6px 0 10px; }
        .scout-card-footer {
            display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 8px;
        }
        .scout-verdict-badge {
            padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 600;
        }
        .scout-avg-circle {
            width: 36px; height: 36px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: 700;
            font-size: 0.78rem; border: 2px solid;
        }

        /* ── Expandable list table ── */
        .scouting-list-wrapper { display: none; }
        .scouting-list-wrapper .section-card { padding: 0; overflow: hidden; border-radius: 20px; }

        .scouting-table { width: 100%; border-collapse: collapse; }
        .scouting-table th {
            text-align: left; padding: 12px 16px;
            border-bottom: 2px solid var(--border-light);
            color: var(--text-medium); font-weight: 600; font-size: 13px;
            white-space: nowrap;
        }
        .scouting-table td {
            padding: 12px 16px; border-bottom: 1px solid var(--border-light);
            color: var(--text-dark); font-size: 14px; vertical-align: middle;
        }
        .scouting-table tr:last-child td { border-bottom: none; }
        .scouting-table tbody tr.player-row { cursor: pointer; transition: background 0.12s; }
        .scouting-table tbody tr.player-row:hover { background: var(--primary-light); }

        /* Player name cell with avatar */
        .player-cell { display: flex; align-items: center; gap: 10px; }
        .player-cell-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, #ccf5ec, #e6f9f4);
            color: var(--primary); display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 800; flex-shrink: 0;
        }
        .player-cell-name { font-weight: 600; color: var(--text-dark); }

        /* ── Report Modal rating rows ── */
        .report-section-title {
            font-size: 0.9rem; font-weight: 700; margin: 16px 0 8px; padding: 6px 0;
            border-bottom: 2px solid var(--border-light); display: flex; align-items: center; gap: 8px;
        }
        .report-section-title i { font-size: 0.85rem; }
        .rating-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 0; border-bottom: 1px solid #f8fafc;
        }
        .rating-row label { font-size: 0.82rem; color: #475569; flex: 1; margin: 0; }
        .rating-stars { display: flex; gap: 4px; }
        .rating-stars button {
            width: 28px; height: 28px; border: 1px solid #e2e8f0; border-radius: 6px;
            background: #fff; cursor: pointer; font-size: 0.72rem; font-weight: 600;
            color: #94a3b8; transition: all 0.15s;
        }
        .rating-stars button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .rating-stars button:hover { border-color: var(--primary); }

        .empty-state {
            text-align: center; padding: 60px 20px; color: #94a3b8;
        }
        .empty-state i { font-size: 3rem; margin-bottom: 12px; display: block; }
        .empty-state p { font-size: 0.95rem; }

        /* Global avg indicator (colored ring) */
        .avg-indicator {
            display: inline-flex; align-items: center; gap: 4px;
            font-weight: 700; font-size: 0.9rem;
        }
        .avg-ring {
            width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700;
        }

        @media (max-width: 768px) {
            .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
            .header-actions { flex-direction: column; width: 100%; }
            .header-actions .search-bubble-container { min-width: unset; width: 100%; }
            .header-actions .dash-btn { width: 100%; justify-content: center; }
            .scout-cards-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
            .scout-card { padding: 16px 12px 14px; }
            .scout-card-avatar { width: 48px; height: 48px; font-size: 1.1rem; margin-bottom: 8px; }
            .scout-card-name { font-size: 0.85rem; }
            .scouting-toolbar { flex-direction: column; align-items: stretch; }
            .filter-select-pill { width: 100%; }
            .scouting-table th, .scouting-table td { padding: 10px 10px; font-size: 0.78rem; }
            .scouting-table th:nth-child(3),
            .scouting-table td:nth-child(3),
            .scouting-table th:nth-child(5),
            .scouting-table td:nth-child(5),
            .scouting-table th:nth-child(8),
            .scouting-table td:nth-child(8) { display: none; }
            .player-cell-avatar { width: 28px; height: 28px; font-size: 0.6rem; }
            .detail-content { grid-template-columns: 1fr; }
            .modal-container { margin: 8px; max-width: calc(100vw - 16px) !important; }
            .modal-body-bubble { max-height: 65vh !important; }
            .bubble-grid-2 { grid-template-columns: 1fr !important; }
            .rating-row { flex-direction: column; align-items: flex-start; gap: 6px; }
            .rating-row label { font-size: 0.78rem; }
        }

        @media (max-width: 480px) {
            .scout-cards-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .scout-card { padding: 14px 10px 12px; border-radius: 14px; }
            .scout-card-avatar { width: 40px; height: 40px; font-size: 0.95rem; }
            .scouting-table th:nth-child(4),
            .scouting-table td:nth-child(4) { display: none; }
            .view-toggle-group { display: none; }
        }
    </style>

<style>
  .sidebar-shell {
    position: fixed; top: 0; left: 0; width: 260px; height: 100vh;
    background: #0D1B2A; z-index: 99;
  }
  /* Hide shell once real sidebar is loaded */
  .sidebar ~ .sidebar-shell,
  .sidebar-loaded .sidebar-shell { display: none; }
  .sidebar-loaded::before { display: none !important; }
  @media (max-width: 768px) { .sidebar-shell { display: none; } }
</style>
</head>

<body>
    <div class="app-container"><div class="sidebar-shell" aria-hidden="true"></div>
        <main class="main-content">
            <header class="page-header">
                <div class="header-info" style="flex: 1;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 4px;">
                        <button id="mobileMenuToggle" class="mobile-nav-toggle">
                            <i class="fas fa-bars"></i>
                        </button>
                        <h1>Scouting</h1>
                    </div>
                    <p>Discover, evaluate and track external players <span id="scoutingCount" style="font-weight: 600; color: var(--primary);"></span></p>
                </div>

                <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                    <div class="view-toggle-group" id="viewToggleGroup">
                        <button class="view-toggle-btn active" data-view="list" title="List View">
                            <i class="fas fa-list"></i>
                        </button>
                        <button class="view-toggle-btn" data-view="grid" title="Grid View">
                            <i class="fas fa-th-large"></i>
                        </button>
                    </div>

                    <div class="search-bubble-container" style="min-width: 200px;">
                        <i class="fas fa-search"></i>
                        <input type="text" id="scoutSearch" placeholder="Search by name, position, club...">
                    </div>

                    <button class="dash-btn primary" id="btnAddScoutedPlayer"
                        style="border-radius: 9999px; height: 44px; display: flex; align-items: center; gap: 8px; white-space: nowrap;">
                        <i class="fas fa-plus"></i> Add Player
                    </button>
                </div>
            </header>

            <!-- Filter toolbar -->
            <div class="scouting-toolbar">
                <div class="filter-group">
                    <span class="filter-label">Filter</span>
                    <div class="filter-pill-container">
                        <select class="filter-select-pill" id="scoutFilter">
                            <option value="all">All Players</option>
                            <option value="unevaluated">Unevaluated</option>
                            <option value="evaluated">Evaluated</option>
                            <option value="sign">Verdict: Sign</option>
                            <option value="trial">Verdict: Trial</option>
                            <option value="monitor">Verdict: Monitor</option>
                            <option value="shadow">Verdict: Shadow-player</option>
                            <option value="loan">Verdict: Loan</option>
                            <option value="reject">Verdict: Reject</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Position</span>
                    <div class="filter-pill-container">
                        <select class="filter-select-pill" id="positionFilter">
                            <option value="all">All Positions</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <!-- Grid view -->
            <div class="scout-cards-grid" id="scoutingGrid" style="display:none;"></div>

            <!-- List view (default) -->
            <div class="scouting-list-wrapper" id="scoutingList">
                <div class="section-card" style="padding:0; overflow:hidden; border-radius:20px;">
                    <div style="overflow-x: auto;">
                        <table class="scouting-table">
                            <thead>
                                <tr>
                                    <th>Player</th>
                                    <th>Position</th>
                                    <th>Birth Date</th>
                                    <th>Current Club</th>
                                    <th>Team</th>
                                    <th>Final Evaluation</th>
                                    <th>Global Average</th>
                                    <th>Scout</th>
                                    <th style="width:60px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="scoutingListBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div id="paginationBar" style="display:flex; align-items:center; justify-content:space-between; margin-top:16px; font-size:0.82rem; color:var(--text-medium);"></div>
        </main>
    </div>

    <!-- Add/Edit Player Modal -->
    <div class="modal-overlay" id="playerModal">
        <div class="modal-container modal-bubble" style="max-width: 580px;">
            <div class="modal-header-bubble">
                <h2 id="playerModalTitle">Add Scouted Player</h2>
                <button class="btn-close-modal" id="btnCancelPlayer">&times;</button>
            </div>
            <div class="modal-body-bubble" style="max-height: 70vh; overflow-y: auto;">
                <input type="hidden" id="editPlayerId">
                <div class="bubble-grid-2">
                    <div class="form-group-bubble">
                        <label>Full Name *</label>
                        <input type="text" id="spName" class="form-control-bubble" placeholder="e.g. John Doe" required>
                    </div>
                    <div class="form-group-bubble">
                        <label>Date of Birth</label>
                        <input type="date" id="spDob" class="form-control-bubble">
                    </div>
                </div>
                <div class="bubble-grid-2">
                    <div class="form-group-bubble">
                        <label>Position</label>
                        <select id="spPosition" class="form-control-bubble"><option value="">Select...</option></select>
                    </div>
                    <div class="form-group-bubble">
                        <label>Preferred Foot</label>
                        <select id="spFoot" class="form-control-bubble"><option value="">Select...</option></select>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border-light); margin: 24px 0;">
                <h3 style="font-size: 0.95rem; color: var(--navy-dark); margin: 0 0 16px 0;">Physical Specs</h3>

                <div class="bubble-grid-2">
                    <div class="form-group-bubble">
                        <label>Height (cm)</label>
                        <input type="number" id="spHeight" class="form-control-bubble" placeholder="e.g. 178">
                    </div>
                    <div class="form-group-bubble">
                        <label>Weight (kg)</label>
                        <input type="number" id="spWeight" class="form-control-bubble" placeholder="e.g. 72">
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border-light); margin: 24px 0;">
                <h3 style="font-size: 0.95rem; color: var(--navy-dark); margin: 0 0 16px 0;">Club & Agent Info</h3>

                <div class="bubble-grid-2">
                    <div class="form-group-bubble">
                        <label>Current Club</label>
                        <input type="text" id="spCurrentClub" class="form-control-bubble" placeholder="e.g. SuperSport Academy">
                    </div>
                    <div class="form-group-bubble">
                        <label>Current Team</label>
                        <input type="text" id="spCurrentTeam" class="form-control-bubble" placeholder="e.g. U17">
                    </div>
                </div>
                <div class="bubble-grid-2">
                    <div class="form-group-bubble">
                        <label>Scouting For (Target Squad)</label>
                        <select id="spTargetSquad" class="form-control-bubble"><option value="">Not assigned</option></select>
                    </div>
                    <div class="form-group-bubble">
                        <label>Agent Name</label>
                        <input type="text" id="spAgentName" class="form-control-bubble">
                    </div>
                </div>
                <div class="bubble-grid-2">
                    <div class="form-group-bubble">
                        <label>Agent Contact</label>
                        <input type="text" id="spAgentContact" class="form-control-bubble" placeholder="Phone or email">
                    </div>
                    <div class="form-group-bubble">
                        <label>&nbsp;</label>
                    </div>
                </div>
                <div class="form-group-bubble">
                    <label>Notes</label>
                    <textarea id="spNotes" class="form-control-bubble" rows="3" placeholder="Any additional notes..."></textarea>
                </div>
            </div>
            <div class="modal-footer-bubble">
                <button class="dash-btn outline btn-close-modal-cancel">Cancel</button>
                <button class="dash-btn primary" id="btnSavePlayer">Save Player</button>
            </div>
        </div>
    </div>

    <!-- Quick Report Modal -->
    <div class="modal-overlay" id="quickReportModal">
        <div class="modal-container modal-bubble" style="max-width: 620px;">
            <div class="modal-header-bubble">
                <h2>Quick Scouting Report</h2>
                <button class="btn-close-modal" id="btnCancelQR">&times;</button>
            </div>
            <div class="modal-body-bubble" style="max-height: 70vh; overflow-y: auto;">
                <input type="hidden" id="qrPlayerId">
                <div class="bubble-grid-2">
                    <div class="form-group-bubble">
                        <label>Match / Context</label>
                        <input type="text" id="qrMatchContext" class="form-control-bubble" placeholder="e.g. U17 League vs Sundowns">
                    </div>
                    <div class="form-group-bubble">
                        <label>Date</label>
                        <input type="date" id="qrDate" class="form-control-bubble">
                    </div>
                </div>
                <div class="form-group-bubble">
                    <label>Verdict (Final Evaluation)</label>
                    <select id="qrVerdict" class="form-control-bubble">
                        <option value="">Select verdict...</option>
                        <option value="sign">Sign</option>
                        <option value="trial">Trial</option>
                        <option value="monitor">Monitor</option>
                        <option value="shadow">Shadow-player</option>
                        <option value="loan">Loan</option>
                        <option value="reject">Reject</option>
                    </select>
                </div>
                <div id="qrSections"></div>
                <hr style="border: 0; border-top: 1px solid var(--border-light); margin: 20px 0;">
                <h3 style="font-size: 0.95rem; color: var(--navy-dark); margin: 0 0 12px 0;">Feedback</h3>
                <div class="form-group-bubble">
                    <label>Strengths</label>
                    <textarea id="qrStrengths" class="form-control-bubble" rows="2"></textarea>
                </div>
                <div class="form-group-bubble">
                    <label>Weaknesses</label>
                    <textarea id="qrWeaknesses" class="form-control-bubble" rows="2"></textarea>
                </div>
                <div class="form-group-bubble">
                    <label>Recommendation</label>
                    <textarea id="qrRecommendation" class="form-control-bubble" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer-bubble">
                <button class="dash-btn outline btn-close-modal-cancel">Cancel</button>
                <button class="dash-btn primary" id="btnSaveQR">Save Report</button>
            </div>
        </div>
    </div>

    <!-- Full Report Modal -->
    <div class="modal-overlay" id="fullReportModal">
        <div class="modal-container modal-bubble" style="max-width: 660px;">
            <div class="modal-header-bubble">
                <h2>Full Scouting Report</h2>
                <button class="btn-close-modal" id="btnCancelFR">&times;</button>
            </div>
            <div class="modal-body-bubble" style="max-height: 70vh; overflow-y: auto;">
                <input type="hidden" id="frPlayerId">
                <div class="bubble-grid-2">
                    <div class="form-group-bubble">
                        <label>Match / Context</label>
                        <input type="text" id="frMatchContext" class="form-control-bubble" placeholder="e.g. Tournament Final">
                    </div>
                    <div class="form-group-bubble">
                        <label>Date</label>
                        <input type="date" id="frDate" class="form-control-bubble">
                    </div>
                </div>
                <div class="form-group-bubble">
                    <label>Verdict (Final Evaluation)</label>
                    <select id="frVerdict" class="form-control-bubble">
                        <option value="">Select verdict...</option>
                        <option value="sign">Sign</option>
                        <option value="trial">Trial</option>
                        <option value="monitor">Monitor</option>
                        <option value="shadow">Shadow-player</option>
                        <option value="loan">Loan</option>
                        <option value="reject">Reject</option>
                    </select>
                </div>
                <div id="frSections"></div>
                <hr style="border: 0; border-top: 1px solid var(--border-light); margin: 20px 0;">
                <h3 style="font-size: 0.95rem; color: var(--navy-dark); margin: 0 0 12px 0;">Feedback</h3>
                <div class="form-group-bubble">
                    <label>Strengths</label>
                    <textarea id="frStrengths" class="form-control-bubble" rows="2"></textarea>
                </div>
                <div class="form-group-bubble">
                    <label>Weaknesses</label>
                    <textarea id="frWeaknesses" class="form-control-bubble" rows="2"></textarea>
                </div>
                <div class="form-group-bubble">
                    <label>Recommendation</label>
                    <textarea id="frRecommendation" class="form-control-bubble" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer-bubble">
                <button class="dash-btn outline btn-close-modal-cancel">Cancel</button>
                <button class="dash-btn primary" id="btnSaveFR">Save Report</button>
            </div>
        </div>
    </div>

</body>

</html>
