<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches | UP Performance Analysis Hub</title>
    <link rel="stylesheet" href="css/style.css?v=1771598058760">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-logo"><i class="fas fa-futbol"></i></div>
                                <div class="brand-text">
                    <h3>Football</h3>
                    <p>Performance Hub</p>
                </div>
                
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard_v2.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
                    <li><a href="planner.html"><i class="fas fa-clipboard-list"></i><span>Session Planner</span></a></li>
                    <li><a href="library.html"><i class="fas fa-book"></i><span>Library</span></a></li>
                    <li><a href="reports.html"><i class="fas fa-file-alt"></i><span>Reports</span></a></li>
                    <li><a href="squad.html"><i class="fas fa-user-friends"></i><span>Squad Management</span></a></li>
                    <li><a href="players.html"><i class="fas fa-user"></i><span>Player Management</span></a></li>
                    <li><a href="matches.html"><i class="fas fa-futbol"></i><span>Matches</span></a></li>
                    <li><a href="analytics.html"><i class="fas fa-chart-line"></i><span>Analytics</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-toggle-sidebar" id="toggleSidebar" title="Toggle Sidebar">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div class="header-info">
                    <h1>Matches</h1>
                    <p>Manage results and view upcoming fixtures</p>
                </div>
                <div class="header-actions">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search matches..." id="matchSearch">
                    </div>
                    <select class="dropdown-filter" id="matchesTeamSelector">
                        <option value="all">All Teams</option>
                        <!-- Populated by JS -->
                    </select>
                    <button type="button" id="btn-new-match" class="btn-primary">
                        <i class="fas fa-plus"></i> Add Match
                    </button>
                </div>
            </header>

            <div id="matchesList">
                <!-- Matches will be rendered here dynamically -->
            </div>
        </main>
    </div>

    <!-- Add Match Modal -->
    <div id="createMatchModal" class="modal-overlay" style="display: none;">
        <div class="modal-container" style="max-width: 700px;">
            <div class="modal-header">
                <h2>Add New Match</h2>
                <button class="btn-close-modal" onclick="closeAddMatchModal()">&times;</button>
            </div>

            <form id="matchForm">
                <div class="form-section-title">Match Details</div>
                
                <div class="form-group">
                    <label>Competition</label>
                    <input type="text" id="matchCompetition" class="form-control" 
                           placeholder="e.g. DStv Diski Challenge" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Home Team</label>
                        <input type="text" id="matchHomeTeam" class="form-control" 
                               placeholder="UP - Tuks" value="UP - Tuks">
                    </div>
                    <div class="form-group">
                        <label>Away Team</label>
                        <input type="text" id="matchAwayTeam" class="form-control" 
                               placeholder="Opponent Name" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="matchDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" id="matchTime" class="form-control">
                    </div>
                </div>

                <div class="form-group">
                    <label>Venue</label>
                    <input type="text" id="matchVenue" class="form-control" 
                           placeholder="e.g. Tuks Stadium">
                </div>

                <div class="form-group">
                    <label>Squad/Team</label>
                    <select id="matchSquad" class="form-control">
                        <option value="">Select Squad</option>
                        <!-- Populated by JS -->
                    </select>
                </div>

                <div class="form-section-title">Score (Optional - can be added later)</div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Home Score</label>
                        <input type="number" id="matchHomeScore" class="form-control" 
                               placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>Away Score</label>
                        <input type="number" id="matchAwayScore" class="form-control" 
                               placeholder="0" min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label>Match Status</label>
                    <select id="matchStatus" class="form-control">
                        <option value="upcoming">Upcoming</option>
                        <option value="completed">Completed</option>
                        <option value="live">Live</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-ghost" onclick="closeAddMatchModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Add Match</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/squad-manager.js"></script>
    <script src="js/match-manager.js"></script>
    <script src="js/match-ui.js"></script>
    
    <script>
        // Add this fallback script in case the external JS files have issues
        function closeAddMatchModal() {
            const modal = document.getElementById('createMatchModal');
            if (modal) {
                modal.style.display = 'none';
            }
        }

        // Ensure the button opens the modal
        document.addEventListener('DOMContentLoaded', function() {
            const btnNewMatch = document.getElementById('btn-new-match');
            const modal = document.getElementById('createMatchModal');
            
            if (btnNewMatch && modal) {
                btnNewMatch.addEventListener('click', function(e) {
                    e.preventDefault();
                    modal.style.display = 'flex';
                });
            }

            // Close modal when clicking outside
            if (modal) {
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) {
                        closeAddMatchModal();
                    }
                });
            }
        });
    </script>
</body>

</html>
